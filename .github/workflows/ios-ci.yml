name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Reject committed secrets and certificates
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(GoogleService-Info\.plist|.*\.(p12|p8|cer|mobileprovision))$'; then
            echo "Sensitive configuration or certificate files must not be committed."
            exit 1
          fi

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project CryptoTracker.xcodeproj \
            -scheme CryptoTracker

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project CryptoTracker.xcodeproj \
            -scheme CryptoTracker \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
