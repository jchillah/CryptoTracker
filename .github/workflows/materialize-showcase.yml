name: Materialize showcase image

on:
  push:
    branches:
      - agent/store-showcase-image
    paths:
      - .github/showcase-upload/**
      - .github/workflows/materialize-showcase.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build showcase image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/showcases
          cat .github/showcase-upload/part-*.b64 | base64 --decode > assets/showcases/cryptotracker-showcase.webp
          test -s assets/showcases/cryptotracker-showcase.webp
          file assets/showcases/cryptotracker-showcase.webp | grep -q 'Web/P image'
          rm -rf .github/showcase-upload
          rm -f .github/workflows/materialize-showcase.yml

      - name: Commit generated asset
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add CryptoTracker showcase image'
          git push
